version: "3.9"

services:
  fastapi:
    build: ./backend/fastapi-service
    ports:
      - "8000:8000"
    environment:
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: xai_stress_tester
      POSTGRES_DSN: postgresql://postgres:postgres@postgres:5432/xai_metrics
    volumes:
      - ./fastapi-service:/app           # Live reload during dev
      - hf_cache:/root/.cache/huggingface # Persist downloaded model weights
    depends_on:
      mongo:
        condition: service_healthy
      postgres:
        condition: service_healthy
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]        # Remove if no GPU available

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: xai_metrics
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo_data:
  postgres_data:
  hf_cache:
